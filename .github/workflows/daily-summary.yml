name: Daily Feed Summary

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

concurrency:
  group: daily-feed-summary
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openrouter' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'stepfun/step-3.5-flash:free' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash-lite' }}
      SITE_TITLE: ${{ vars.SITE_TITLE }}
      SUMMARY_LANGUAGE: ${{ vars.SUMMARY_LANGUAGE }}
      MIN_FEED_CONTENT_CHARS: ${{ vars.MIN_FEED_CONTENT_CHARS }}
      MAX_ITEM_CHARS: ${{ vars.MAX_ITEM_CHARS }}
      MAX_PROMPT_CHARS: ${{ vars.MAX_PROMPT_CHARS }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest
        run: python src/main.py

      - name: Commit generated artifacts
        run: |
          if git diff --quiet -- data/state.json data/latest.json site/index.html site/.nojekyll; then
            echo "No generated artifact changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json data/latest.json site/index.html site/.nojekyll
          git commit -m "Update generated digest and site"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
